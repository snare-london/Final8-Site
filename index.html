<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final 8 Leaderboard</title>

    <style>
      html, body { margin: 0; }
      body { font-family: 'AFL Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; color: #222; line-height: 1.6; padding: 20px; font-size: 16px; display: flex; justify-content: center; }
      .container { max-width: 1400px; margin: 0; background: transparent; padding: 30px; border-radius: 0; box-shadow: none; }
      h1 { color: #003087; margin: 0 0 10px 0; padding-bottom: 15px; font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px; border-bottom: 4px solid #d91e18; display: inline-block; }
      h2 { color: #003087; margin: 0 0 15px 0; font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; text-align: center; }
      .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #003087; font-weight: 700; font-size: 0.95rem; transition: color 0.2s; }
      .back-btn:hover { color: #d91e18; }
      .tables-wrapper { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; align-items: flex-start; }
      .table-column { display: flex; flex-direction: column; gap: 30px; }
      .tables-wrapper > div:not(:first-child) { border-left: none; padding-left: 0; }
      table { width: 100%; border-collapse: collapse; margin: 0 auto; }
      th { text-align: center; padding: 14px 12px; background: #003087; color: white; font-weight: 700; border: none; font-size: 0.95rem; letter-spacing: 0.3px; }
      th:first-child { text-align: left; }
      td { padding: 12px; border-bottom: 1px solid #e8e8e8; color: #333; font-size: 0.95rem; text-align: center; }
      td:first-child { font-weight: 700; text-align: left; color: #003087; }
      tr:nth-child(even) { background-color: #f8f9fa; }
      tr:hover { background-color: #f0f3f7; }
      .name-link { color: #003087; font-weight: 700; text-decoration: none; transition: color 0.2s; }
      .name-link:hover { color: #d91e18; text-decoration: underline; }
      .timestamp { margin: 10px 0 0 0; color: #666; font-style: italic; font-size: 0.9rem; }
      .table-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: auto; min-width: 350px; display: flex; flex-direction: column; align-items: stretch; box-sizing: border-box; }

      .logo { max-width: 220px; height: auto; margin: 0 0 10px 0; }
      @media (max-width: 812px) {
      body { padding: 12px; font-size: 16px; }
      .container { padding: 18px; max-width: 100%; }
      h1 { font-size: 1.8rem; margin-bottom: 5px; }
      h2 { font-size: 1.2rem; }
      th, td { font-size: 0.9rem; padding: 10px 8px; }
      .tables-wrapper { flex-direction: column; gap: 0; margin-top: 12px; }
      .table-column { gap: 0; }
      .table-card { min-width: 100%; margin-bottom: 20px; }
      .tables-wrapper > div:not(:first-child) { border-left: none; padding-left: 0; }
      }
    </style>
</head>

<body>
  <div class="container">
    <center><img src="Media/afl-logo-png-transparent_crop.png" alt="AFL Logo" class="logo"></center>
    <center><h1>2026 Final 8 Tipping Comp</h1>
    <p class="timestamp">Last Updated: <span id="timestamp">Loading...</span></center></p>
    <div class="tables-wrapper">
      <div class="table-card">
        <h2>Leaderboard</h2>
        <table id="ladder"></table>
      </div>
      <div class="table-card">
        <h2>Current Ladder</h2>
        <table id="websiteViewLadder"></table>
      </div>
      <div class="table-column">
        <div class="table-card">
          <h2>Bookies' Picks</h2>
          <table id="manualResults"></table>
        </div>
        <div class="table-card">
          <h2>Current Coleman Standings</h2>
          <table id="coleman"></table>
        </div>
      </div>
    </div>
  </div>

<script>
    const apiBase = "https://api.sheetbest.com/sheets/cfe4e2ab-a31c-4894-8926-ed9b3140078b/tabs";

    function populateTable(url, tableId) {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          if (!data.length) return;

          const table = document.getElementById(tableId);

          // Headers
          const headerRow = document.createElement("tr");
          Object.keys(data[0]).forEach(key => {
            if (key === "LastUpdated") return;
            
            const th = document.createElement("th");
            th.textContent = key;
            headerRow.appendChild(th);
          });
          table.appendChild(headerRow);

          // Rows
          data.forEach(row => {
            const tr = document.createElement("tr");
            
            Object.entries(row).forEach(([key, value]) => {
              if (key === "LastUpdated") return;

              const td = document.createElement("td");
              
              if (key === "Name") {
                const link = document.createElement("a");
                link.href = `profile.html?name=${encodeURIComponent(value)}`;
                link.textContent = value;
                link.className = 'name-link';
                td.appendChild(link);
              } else {
                td.textContent = value;
              }
              
              tr.appendChild(td);
            });
            table.appendChild(tr);
          });
        })
        .catch(err => console.error(err));
    }

    // Set timestamp from first table
    fetch(apiBase + "/Website_View")
      .then(res => res.json())
      .then(data => {
        if (data.length) {
          document.getElementById('timestamp').innerText = data[0].LastUpdated;
        }
      })
      .catch(err => console.error(err));

    populateTable(apiBase + "/Website_View", "ladder");
    populateTable(apiBase + "/Website_View_Ladder", "websiteViewLadder");
    populateTable(apiBase + "/Website_View_Coleman", "coleman");
    populateTable(apiBase + "/Website_View_ManualResults", "manualResults");
</script>

</body>
</html>
