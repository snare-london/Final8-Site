<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final 8 Leaderboard</title>
    <style>
      html, body { margin: 0; }
      body { font-family: 'AFL Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; color: #222; line-height: 1.6; padding: 15px; font-size: 16px; display: flex; justify-content: center; }
      .container { max-width: 100%; margin: 0; background: transparent; padding: 10px; border-radius: 0; box-shadow: none; }
      h1 { color: #003087; margin: 0 0 10px 0; padding-bottom: 10px; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; border-bottom: 4px solid #d91e18; display: inline-block; }
      h2 { color: #003087; margin: 0 0 12px 0; font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; text-align: center; }
      .tables-wrapper { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }
      .table-column { display: flex; flex-direction: column; gap: 15px; }
      table { width: 100%; border-collapse: collapse; margin: 0 auto; }
      th { text-align: center; padding: 10px 8px; background: #003087; color: white; font-weight: 700; border: none; font-size: 0.9rem; letter-spacing: 0.3px; }
      th:first-child, td:first-child { text-align: center; }
      td { padding: 10px 8px; border-bottom: 1px solid #e8e8e8; color: #333; font-size: 0.9rem; text-align: center; }
      td:first-child { font-weight: 700; color: #003087; }
      tr:nth-child(even) { background-color: #f8f9fa; }
      tr:hover { background-color: #f0f3f7; }
      .name-link { color: #003087; font-weight: 700; text-decoration: none; }
      .name-link:hover { color: #d91e18; text-decoration: underline; }
      .timestamp { margin: 5px 0 0 0; color: #666; font-style: italic; font-size: 0.85rem; }
      /* REDUCED PADDING AND MIN-WIDTH */
      .table-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: auto; min-width: 280px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
      .logo { max-width: 180px; height: auto; margin: 0 0 5px 0; }
      @media (max-width: 812px) {
        .table-card { min-width: 100%; width: 100%; }
        .tables-wrapper { gap: 10px; }
      }
    </style>
</head>
<body>
  <div class="container">
    <center><img src="Media/afl-logo-png-transparent_crop.png" alt="AFL Logo" class="logo"></center>
    <center><h1>2026 Final 8 Tipping Comp</h1>
    <p class="timestamp">Last Updated: <span id="timestamp">Loading...</span></p></center>
    <div class="tables-wrapper">
      <div class="table-card">
        <h2>Leaderboard</h2>
        <table id="ladder"></table>
      </div>
      <div class="table-card">
        <h2>Current Ladder</h2>
        <table id="websiteViewLadder"></table>
      </div>
      <div class="table-column">
        <div class="table-card">
          <h2>Bookies' Picks</h2>
          <table id="manualResults"></table>
        </div>
        <div class="table-card">
          <h2>Coleman Standings</h2>
          <table id="coleman"></table>
        </div>
      </div>
    </div>
  </div>
  <script>
    const apiBase = "https://script.google.com/macros/s/AKfycbxD1KWiQL_W5mwwzpQrBbK0hYyttiFUodhAOzzwGU3zRowpmNisbtxFHu-CpY5uSE5V/exec";
    function populateTable(url, tableId) {
      fetch(url).then(res => res.json()).then(data => {
        if (!data.length) return;
        const table = document.getElementById(tableId);
        const headerRow = document.createElement("tr");
        Object.keys(data[0]).forEach(key => {
          if (key === "LastUpdated") return;
          const th = document.createElement("th");
          th.textContent = key;
          headerRow.appendChild(th);
        });
        table.appendChild(headerRow);
        data.forEach(row => {
          const tr = document.createElement("tr");
          Object.entries(row).forEach(([key, value]) => {
            if (key === "LastUpdated") return;
            const td = document.createElement("td");
            if (key === "Name") {
              const link = document.createElement("a");
              link.href = `profile.html?name=${encodeURIComponent(value)}`;
              link.textContent = value;
              link.className = 'name-link';
              td.appendChild(link);
            } else if (key.includes("%")) {
              td.textContent = (parseFloat(value) * 100).toFixed(2) + "%";
            } else {
              td.textContent = value;
            }
            tr.appendChild(td);
          });
          table.appendChild(tr);
        });
      });
    }
    fetch(apiBase + "?tab=Website_View").then(res => res.json()).then(data => {
      if (data.length) {
        const date = new Date(data[0].LastUpdated);
        document.getElementById('timestamp').innerText = date.toLocaleString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }
    });
    populateTable(apiBase + "?tab=Website_View", "ladder");
    populateTable(apiBase + "?tab=Website_View_Ladder", "websiteViewLadder");
    populateTable(apiBase + "?tab=Website_View_Coleman", "coleman");
    populateTable(apiBase + "?tab=Website_View_ManualResults", "manualResults");
  </script>
</body>
</html>
