<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final 8 Leaderboard</title>
    <style>
      html, body { margin: 0; }
      body { font-family: 'AFL Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; color: #222; line-height: 1.6; padding: 20px; font-size: 16px; display: flex; justify-content: center; }
      .container { max-width: 900px; margin: 0; background: transparent; padding: 10px; border-radius: 0; box-shadow: none; }
      h1 { color: #003087; margin: 0 0 10px 0; padding-bottom: 10px; font-size: 2rem; font-weight: 700; border-bottom: 4px solid #d91e18; display: inline-block; }
      h2 { color: #003087; margin: 0 0 12px 0; font-size: 1.3rem; font-weight: 700; text-align: center; }
      table { width: 100%; border-collapse: collapse; margin: 0 auto; }
      th { text-align: center; padding: 10px 8px; background: #003087; color: white; font-weight: 700; font-size: 0.95rem; }
      th:first-child, td:first-child { text-align: center; }
      td { padding: 10px 8px; border-bottom: 1px solid #e8e8e8; color: #333; font-size: 0.95rem; text-align: center; }
      td:first-child { font-weight: 700; color: #003087; }
      tr:nth-child(even) { background-color: #f8f9fa; }
      .table-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: 100%; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
      .logo { max-width: 180px; height: auto; margin-bottom: 10px; }
    </style>
</head>
<body>
  <div class="container">
    <center><img src="Media/afl-logo-png-transparent_crop.png" alt="AFL Logo" class="logo"></center>
    <center><h1>2026 Final 8 Tipping Comp</h1></center>
    <div class="table-card">
      <h2>Current Ladders</h2>
      <table id="websiteViewLadder"></table>
    </div>
  </div>
  <script>
    const apiBase = "https://script.google.com/macros/s/AKfycbxD1KWiQL_W5mwwzpQrBbK0hYyttiFUodhAOzzwGU3zRowpmNisbtxFHu-CpY5uSE5V/exec";
    function populateTable(url, tableId) {
      fetch(url).then(res => res.json()).then(data => {
        if (!data.length) return;
        const table = document.getElementById(tableId);
        const headerRow = document.createElement("tr");
        Object.keys(data[0]).forEach(key => {
          if (key === "LastUpdated") return;
          const th = document.createElement("th");
          th.textContent = key;
          headerRow.appendChild(th);
        });
        table.appendChild(headerRow);
        data.forEach(row => {
          const tr = document.createElement("tr");
          Object.entries(row).forEach(([key, value]) => {
            if (key === "LastUpdated") return;
            const td = document.createElement("td");
            if (key.includes("%")) {
              td.textContent = (parseFloat(value) * 100).toFixed(2) + "%";
            } else {
              td.textContent = value;
            }
            tr.appendChild(td);
          });
          table.appendChild(tr);
        });
      });
    }
    populateTable(apiBase + "?tab=Website_View_Ladder", "websiteViewLadder");
  </script>
</body>
</html>
